name = "rpg-backend"
main = "server/index.ts"
compatibility_date = "2024-04-18"

# You can use standard Cloudflare Pages configuration for a Vite React + Hono fullstack app,
# but for D1 development, we bind D1 here.

[[d1_databases]]
binding = "DB"
database_name = "mushoku_rpg_db"
database_id = "local-db-id"
migrations_dir = "drizzle"
