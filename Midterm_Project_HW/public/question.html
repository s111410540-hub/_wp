<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題詳情 - Glory 攻略討論版</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout" id="app-root">
    <main class="main-content">
    <div id="question-container" class="mb-2"></div>
    
    <h3>回答</h3>
    <div id="answers-container"></div>
    
    <div class="card mt-2" id="reply-box">
      <h3>撰寫回答</h3>
      <textarea id="answer-content" rows="4" placeholder="分享你的遊戲經驗或攻略..."></textarea>
      <button class="btn" onclick="submitAnswer()">送出回答</button>
    </div>
  </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const questionId = urlParams.get('id');
    let currentQuestionOwnerId = null;

    async function loadQuestion() {
      try {
        const data = await window.api.getQuestion(questionId);
        const q = data.question;
        currentQuestionOwnerId = q.user_id;
        
        saveToHistory(q.id, q.title);
        
        const user = window.api.getUser();
        const isQuestionOwner = user && user.id === q.user_id;
        
        let qActionHtml = '';
        if (isQuestionOwner) {
          qActionHtml = `
            <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
              <button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" onclick="startEditQuestion(${q.id})">編輯</button>
              <button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; color: var(--danger); border-color: var(--danger);" onclick="deleteQuestion(${q.id})">刪除</button>
            </div>
          `;
        }

        document.getElementById('question-container').innerHTML = `
          <div class="card flex question-layout">
            <div class="vote-section">
              <button class="vote-btn" onclick="vote('question', ${q.id}, 1)">▲</button>
              <span class="vote-count">${q.vote_count}</span>
              <button class="vote-btn" onclick="vote('question', ${q.id}, -1)">▼</button>
            </div>
            <div class="content-section" id="question-display">
              <h1 id="q-display-title">${escapeHtml(q.title)}</h1>
              <p id="q-display-content" style="white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 1rem;">${escapeHtml(q.content)}</p>
              <div class="meta flex-between">
                <div>
                  <span>作者: <a href="/profile.html?id=${q.user_id}" style="color: var(--primary); text-decoration: none; font-weight: 500;">${escapeHtml(q.username)}</a></span>
                  <span>時間: ${formatDate(q.created_at)}</span>
                  ${q.game_tag ? `<span class="tag">${escapeHtml(q.game_tag)}</span>` : ''}
                </div>
              </div>
              ${qActionHtml}
            </div>
            
            <div class="content-section hidden" id="question-edit-form">
              <input type="text" id="edit-q-title" value="${escapeHtml(q.title)}" style="margin-bottom: 0.5rem;">
              <textarea id="edit-q-content" rows="6" style="margin-bottom: 0.5rem;">${escapeHtml(q.content)}</textarea>
              <div class="flex">
                <button class="btn btn-small" onclick="saveQuestionEdit(${q.id})">儲存</button>
                <button class="btn btn-outline btn-small" onclick="cancelEditQuestion()">取消</button>
              </div>
            </div>
          </div>
        `;

        renderAnswers(data.answers, user);
      } catch (err) {
        alert('載入失敗: ' + err.message);
      }
    }

    function renderAnswers(answers, user) {
      const list = document.getElementById('answers-container');
      const isQuestionOwner = user && user.id === currentQuestionOwnerId;

      if (answers.length === 0) {
        list.innerHTML = '<p class="text-muted">還沒有回答，來幫幫他吧！</p>';
        return;
      }

      list.innerHTML = answers.map(a => {
        const isAnswerOwner = user && user.id === a.user_id;
        let ansActionHtml = '';
        if (isAnswerOwner) {
          ansActionHtml = `
            <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
              <button class="btn btn-outline" style="padding: 0.1rem 0.4rem; font-size: 0.75rem;" onclick="startEditAnswer(${a.id})">編輯</button>
              <button class="btn btn-outline" style="padding: 0.1rem 0.4rem; font-size: 0.75rem; color: var(--danger); border-color: var(--danger);" onclick="deleteAnswer(${a.id})">刪除</button>
            </div>
          `;
        }

        return `
          <div class="card flex question-layout ${a.is_accepted ? 'accepted-answer' : ''}" style="${a.is_accepted ? 'border-color: var(--success)' : ''}">
            <div class="vote-section">
              <button class="vote-btn" onclick="vote('answer', ${a.id}, 1)">▲</button>
              <span class="vote-count">${a.vote_count}</span>
              <button class="vote-btn" onclick="vote('answer', ${a.id}, -1)">▼</button>
            </div>
            
            <div class="content-section" id="ans-display-${a.id}">
              <p id="ans-content-raw-${a.id}" class="hidden">${escapeHtml(a.content)}</p>
              <p style="white-space: pre-wrap; margin-bottom: 1rem;">${escapeHtml(a.content)}</p>
              <div class="meta flex-between">
                <div>
                  <span>作者: <a href="/profile.html?id=${a.user_id}" style="color: var(--primary); text-decoration: none; font-weight: 500;">${escapeHtml(a.username)}</a></span>
                  <span>時間: ${formatDate(a.created_at)}</span>
                  ${a.is_accepted ? '<span class="accepted-badge">最佳解答 ✓</span>' : ''}
                </div>
                ${isQuestionOwner && !a.is_accepted ? `<button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" onclick="acceptAnswer(${a.id})">採納此回答</button>` : ''}
              </div>
              ${ansActionHtml}
            </div>
            
            <div class="content-section hidden" id="ans-edit-form-${a.id}">
              <textarea id="edit-a-content-${a.id}" rows="4" style="margin-bottom: 0.5rem;">${escapeHtml(a.content)}</textarea>
              <div class="flex">
                <button class="btn btn-small" onclick="saveAnswerEdit(${a.id})">儲存</button>
                <button class="btn btn-outline btn-small" onclick="cancelEditAnswer(${a.id})">取消</button>
              </div>
            </div>
            
          </div>
        `;
      }).join('');
    }

    async function submitAnswer() {
      if (!window.api.getUser()) {
        alert('請先登入');
        window.location.href = '/login.html';
        return;
      }

      const content = document.getElementById('answer-content').value;
      try {
        await window.api.postAnswer(questionId, content);
        document.getElementById('answer-content').value = '';
        loadQuestion();
      } catch (err) {
        alert('發布失敗: ' + err.message);
      }
    }

    async function vote(targetType, targetId, value) {
      if (!window.api.getUser()) {
        alert('請先登入');
        window.location.href = '/login.html';
        return;
      }
      try {
        await window.api.vote(targetType, targetId, value);
        loadQuestion();
      } catch (err) {
        alert('投票失敗: ' + err.message);
      }
    }

    async function acceptAnswer(answerId) {
      try {
        await window.api.acceptAnswer(answerId);
        loadQuestion();
      } catch (err) {
        alert('採納失敗: ' + err.message);
      }
    }

    // --- Question Edit/Delete ---
    function startEditQuestion() {
      document.getElementById('question-display').classList.add('hidden');
      document.getElementById('question-edit-form').classList.remove('hidden');
    }
    
    function cancelEditQuestion() {
      document.getElementById('question-display').classList.remove('hidden');
      document.getElementById('question-edit-form').classList.add('hidden');
    }
    
    async function saveQuestionEdit(id) {
      const title = document.getElementById('edit-q-title').value;
      const content = document.getElementById('edit-q-content').value;
      try {
        await window.api.editQuestion(id, title, content);
        loadQuestion();
      } catch (err) {
        alert('更新失敗: ' + err.message);
      }
    }
    
    async function deleteQuestion(id) {
      if (!confirm('確定要刪除這個問題嗎？這會連同所有回答一起刪除喔！')) return;
      try {
        await window.api.deleteQuestion(id);
        window.location.href = '/index.html';
      } catch (err) {
        alert('刪除失敗: ' + err.message);
      }
    }

    // --- Answer Edit/Delete ---
    function startEditAnswer(id) {
      document.getElementById(`ans-display-${id}`).classList.add('hidden');
      document.getElementById(`ans-edit-form-${id}`).classList.remove('hidden');
    }
    
    function cancelEditAnswer(id) {
      document.getElementById(`ans-display-${id}`).classList.remove('hidden');
      document.getElementById(`ans-edit-form-${id}`).classList.add('hidden');
    }
    
    async function saveAnswerEdit(id) {
      const content = document.getElementById(`edit-a-content-${id}`).value;
      try {
        await window.api.editAnswer(id, content);
        loadQuestion();
      } catch (err) {
        alert('更新失敗: ' + err.message);
      }
    }
    
    async function deleteAnswer(id) {
      if (!confirm('確定要刪除這個回答嗎？')) return;
      try {
        await window.api.deleteAnswer(id);
        loadQuestion();
      } catch (err) {
        alert('刪除失敗: ' + err.message);
      }
    }

    if (questionId) {
      loadQuestion();
    } else {
      document.getElementById('question-container').innerHTML = '<p>無效的問題 ID</p>';
    }
  </script>
</body>
</html>
