<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題詳情 - 遊戲攻略問答社群</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="/index.html" class="nav-brand">GameQA</a>
      <div class="nav-links" id="nav-links"></div>
    </nav>
  </header>

  <main class="container">
    <div id="question-container" class="mb-2"></div>
    
    <h3>回答</h3>
    <div id="answers-container"></div>
    
    <div class="card mt-2" id="reply-box">
      <h3>撰寫回答</h3>
      <textarea id="answer-content" rows="4" placeholder="分享你的遊戲經驗或攻略..."></textarea>
      <button class="btn" onclick="submitAnswer()">送出回答</button>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const questionId = urlParams.get('id');
    let currentQuestionOwnerId = null;

    async function loadQuestion() {
      try {
        const data = await window.api.getQuestion(questionId);
        const q = data.question;
        currentQuestionOwnerId = q.user_id;
        
        document.getElementById('question-container').innerHTML = `
          <div class="card flex question-layout">
            <div class="vote-section">
              <button class="vote-btn" onclick="vote('question', ${q.id}, 1)">▲</button>
              <span class="vote-count">${q.vote_count}</span>
              <button class="vote-btn" onclick="vote('question', ${q.id}, -1)">▼</button>
            </div>
            <div class="content-section">
              <h1>${escapeHtml(q.title)}</h1>
              <p style="white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 1rem;">${escapeHtml(q.content)}</p>
              <div class="meta">
                <span>作者: ${escapeHtml(q.username)}</span>
                <span>時間: ${formatDate(q.created_at)}</span>
                ${q.game_tag ? `<span class="tag">${escapeHtml(q.game_tag)}</span>` : ''}
              </div>
            </div>
          </div>
        `;

        renderAnswers(data.answers);
      } catch (err) {
        alert('載入失敗: ' + err.message);
      }
    }

    function renderAnswers(answers) {
      const list = document.getElementById('answers-container');
      const user = window.api.getUser();
      const isOwner = user && user.id === currentQuestionOwnerId;

      if (answers.length === 0) {
        list.innerHTML = '<p class="text-muted">還沒有回答，來幫幫他吧！</p>';
        return;
      }

      list.innerHTML = answers.map(a => `
        <div class="card flex question-layout ${a.is_accepted ? 'accepted-answer' : ''}" style="${a.is_accepted ? 'border-color: var(--success)' : ''}">
          <div class="vote-section">
            <button class="vote-btn" onclick="vote('answer', ${a.id}, 1)">▲</button>
            <span class="vote-count">${a.vote_count}</span>
            <button class="vote-btn" onclick="vote('answer', ${a.id}, -1)">▼</button>
          </div>
          <div class="content-section">
            <p style="white-space: pre-wrap; margin-bottom: 1rem;">${escapeHtml(a.content)}</p>
            <div class="meta flex-between">
              <div>
                <span>作者: ${escapeHtml(a.username)}</span>
                <span>時間: ${formatDate(a.created_at)}</span>
                ${a.is_accepted ? '<span class="accepted-badge">最佳解答 ✓</span>' : ''}
              </div>
              ${isOwner && !a.is_accepted ? `<button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" onclick="acceptAnswer(${a.id})">採納此回答</button>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function submitAnswer() {
      if (!window.api.getUser()) {
        alert('請先登入');
        window.location.href = '/login.html';
        return;
      }

      const content = document.getElementById('answer-content').value;
      try {
        await window.api.postAnswer(questionId, content);
        document.getElementById('answer-content').value = '';
        loadQuestion();
      } catch (err) {
        alert('發布失敗: ' + err.message);
      }
    }

    async function vote(targetType, targetId, value) {
      if (!window.api.getUser()) {
        alert('請先登入');
        window.location.href = '/login.html';
        return;
      }
      try {
        await window.api.vote(targetType, targetId, value);
        loadQuestion();
      } catch (err) {
        alert('投票失敗: ' + err.message);
      }
    }

    async function acceptAnswer(answerId) {
      try {
        await window.api.acceptAnswer(answerId);
        loadQuestion();
      } catch (err) {
        alert('採納失敗: ' + err.message);
      }
    }

    if (questionId) {
      loadQuestion();
    } else {
      document.getElementById('question-container').innerHTML = '<p>無效的問題 ID</p>';
    }
  </script>
</body>
</html>
