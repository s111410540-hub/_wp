<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊 - Honor 攻略討論版</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="/index.html" class="nav-brand">Honor 討論版</a>
      <div class="nav-links" id="nav-links"></div>
    </nav>
  </header>

  <main class="container">
    <div class="form-card">
      <h2 class="text-center">註冊帳號</h2>
      <input type="text" id="username" placeholder="使用者名稱 (遊戲暱稱)" required>
      <input type="email" id="email" placeholder="信箱" required>
      <input type="password" id="password" placeholder="密碼" required>
      <button class="btn" style="width: 100%" onclick="register()">註冊</button>
      <p class="text-center mt-2">
        <span class="text-muted">已經有帳號了？</span> 
        <a href="/login.html">前往登入</a>
      </p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        await window.api.register(username, email, password);
        alert('註冊成功！請登入。');
        window.location.href = '/login.html';
      } catch (err) {
        alert('註冊失敗: ' + err.message);
      }
    }
  </script>
</body>
</html>
