<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glory 攻略討論版</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout" id="app-root">
    <main class="main-content">
    <div class="flex-between mb-1">
      <h1>最新問題</h1>
      <button class="btn" id="ask-btn">發布問題</button>
    </div>

    <div class="flex mb-1" style="align-items: center;">
      <input type="text" id="search-input" placeholder="搜尋問題..." style="flex: 1; margin-bottom: 0;">
      <select id="sort-select" class="btn btn-outline" style="margin-bottom: 0;" onchange="changeSort(this.value)">
        <option value="newest">最新發布</option>
        <option value="votes">最多得票</option>
        <option value="unsolved">尚未解決</option>
      </select>
      <button class="btn btn-outline" onclick="resetPageAndLoad()">搜尋</button>
    </div>

    <div class="text-center mb-1">
      <img src="/glory.png" alt="榮耀 Glory" style="max-width: 100%; height: auto; max-height: 250px; object-fit: contain;">
    </div>

    <div class="flex mb-1" style="gap: 0.5rem; flex-wrap: wrap;">
      <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="loadQuestionsByTag('')">全部</button>
      <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="loadQuestionsByTag('周本boss')">周本boss</button>
      <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="loadQuestionsByTag('野圖boss')">野圖boss</button>
      <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="loadQuestionsByTag('公會戰')">公會戰</button>
    </div>

    <div id="ask-form" class="card hidden mb-1">
      <h2>發布新問題</h2>
      <input type="text" id="q-title" placeholder="問題標題 (例如: 請問這週的周本boss怎麼打?)">
      <input type="text" id="q-tag" placeholder="分類標籤 (例如: 周本boss, 野圖boss, 公會戰)">
      <textarea id="q-content" rows="4" placeholder="詳細描述你的問題..."></textarea>
      <button class="btn" onclick="submitQuestion()">送出問題</button>
      <button class="btn btn-outline" onclick="toggleAskForm()">取消</button>
    </div>

    <div id="questions-list"></div>
    
    <div id="pagination-controls" class="flex mt-2 mb-2" style="justify-content: center; align-items: center; gap: 1rem;"></div>
    </div>
  </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('ask-btn').addEventListener('click', () => {
      if (!window.api.getUser()) {
        alert('請先登入');
        window.location.href = '/login.html';
        return;
      }
      toggleAskForm();
    });

    function toggleAskForm() {
      document.getElementById('ask-form').classList.toggle('hidden');
    }

    function loadQuestionsByTag(tag) {
      currentTag = tag;
      document.getElementById('search-input').value = '';
      resetPageAndLoad();
    }

    function changeSort(sort) {
      currentSort = sort;
      resetPageAndLoad();
    }

    function resetPageAndLoad() {
      currentPage = 1;
      loadQuestions();
    }

    let currentTag = '';
    let currentSort = 'newest';
    let currentPage = 1;

    async function loadQuestions() {
      const search = document.getElementById('search-input').value;
      try {
        const data = await window.api.getQuestions(currentTag, search, currentPage, currentSort);
        const list = document.getElementById('questions-list');
        const pagination = document.getElementById('pagination-controls');
        
        let htmlContent = '';

        if (currentTag === '神之領域情報') {
          htmlContent += `
            <div class="card slide-up mb-2" style="background: linear-gradient(135deg, rgba(139, 90, 43, 0.05), rgba(139, 90, 43, 0.1)); border: 1px solid var(--primary); padding: 2rem;">
              <div class="flex-between" style="border-bottom: 1px solid rgba(139, 90, 43, 0.2); padding-bottom: 0.5rem; margin-bottom: 1rem;">
                <h2 style="color: var(--primary); margin-bottom: 0;">👑 官方情報：神之領域</h2>
                <button class="btn btn-outline btn-small" onclick="document.getElementById('god-domain-info').classList.toggle('hidden')">詳細資訊 ▼</button>
              </div>
              
              <div id="god-domain-info" class="hidden">
                <p style="margin-bottom: 1rem; line-height: 1.8; color: var(--text-main);">
                  神之領域是榮耀中等級最高的地圖，只有角色達到滿等 50 級、並完成指定任務的玩家才能進入。<br>
                  這裡聚集了全服最頂尖的玩家，包括各大職業戰隊的選手帳號，以及無數身經百戰的高手。能踏入神之領域，本身就是實力的象徵。
                </p>
                
                <h3 style="color: var(--primary); margin-top: 1.5rem; margin-bottom: 1rem; font-size: 1.2rem;">🌍 世界地圖</h3>
                <p style="margin-bottom: 1rem; color: var(--text-main);">神之領域幅員遼闊，主要分為以下幾大區域：</p>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem;">
                  <div class="bento-card" style="padding: 1.2rem; box-shadow: none; border-color: rgba(139, 90, 43, 0.15);">
                    <h4 style="margin-bottom: 0.5rem; color: #1565c0;">⚓ 碧藍港</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;">位於神之領域西側的沿海城市，藍溪閣公會的根據地。港口貿易繁榮，是新玩家進入神之領域後最常停留的起點城市。</p>
                  </div>
                  <div class="bento-card" style="padding: 1.2rem; box-shadow: none; border-color: rgba(139, 90, 43, 0.15);">
                    <h4 style="margin-bottom: 0.5rem; color: #2e7d32;">🌲 翡翠谷</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;">茂密森林覆蓋的秘境，微草堂公會長年駐守。盛產高階藥材與煉金材料，是補給黨的必訪之地。</p>
                  </div>
                  <div class="bento-card" style="padding: 1.2rem; box-shadow: none; border-color: rgba(139, 90, 43, 0.15);">
                    <h4 style="margin-bottom: 0.5rem; color: #c62828;">🏰 鐵血要塞</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;">位於神之領域北方的軍事要塞，霸圖旗下的天命公會以此為據點。地形險峻，野外 BOSS 密度極高，是硬核玩家的修練場。</p>
                  </div>
                  <div class="bento-card" style="padding: 1.2rem; box-shadow: none; border-color: rgba(139, 90, 43, 0.15);">
                    <h4 style="margin-bottom: 0.5rem; color: #f57f17;">⭐ 星辰廣場</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;">神之領域的中心地帶，各大公會與散人玩家的交流樞紐。競技場、交易所、公會報名處均設於此。</p>
                  </div>
                  <div class="bento-card" style="padding: 1.2rem; box-shadow: none; border-color: rgba(139, 90, 43, 0.15); grid-column: 1 / -1;">
                    <h4 style="margin-bottom: 0.5rem; color: #6a1b9a;">🚫 神祇禁地</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;">傳說中神之領域最深處的區域，至今鮮少有玩家完整探索。據說禁地深處藏有榮耀史上最強的隱藏 BOSS，尚無任何公會成功首殺。</p>
                  </div>
                </div>
              </div>
            </div>
          `;
        }
        
        if (!data.results || data.results.length === 0) {
          list.innerHTML = htmlContent + '<p class="text-center text-muted mt-2">目前沒有問題，成為第一個發問的人吧！</p>';
          pagination.innerHTML = '';
          return;
        }

        list.innerHTML = htmlContent + `<div class="bento-grid">` + data.results.map((q, index) => {
          // 第一頁的第一張卡片才變大
          let bentoClass = (index === 0 && currentPage === 1) ? 'bento-large' : '';
          if (!(index === 0 && currentPage === 1) && q.content && q.content.length > 50) {
            bentoClass += ' bento-tall';
          }
          
          return `
            <div class="bento-card ${bentoClass}" style="animation-delay: ${index * 0.05}s" onclick="window.location.href='/question.html?id=${q.id}'">
              <div>
                ${q.game_tag ? `<div class="mb-1"><span class="tag">${escapeHtml(q.game_tag)}</span></div>` : ''}
                <div class="card-title"><a>${escapeHtml(q.title)}</a></div>
                <div class="card-excerpt">${escapeHtml(q.content)}</div>
              </div>
              
              <div class="flex-between mt-2" style="border-top: 1px solid var(--border); padding-top: 1rem;">
                <div class="meta">
                  <a href="/profile.html?id=${q.user_id}" style="font-weight: 500; color: var(--primary); text-decoration: none;">${escapeHtml(q.username)}</a>
                  ${q.user_badge ? `<span class="user-badge badge-lvl-${q.user_badge.level}">${q.user_badge.title}</span>` : ''}
                  <span>• ${formatDate(q.created_at)}</span>
                  ${q.is_solved ? '<span class="accepted-badge">已解決 ✓</span>' : ''}
                </div>
                
                <div class="flex" style="gap: 0.5rem; align-items: center;">
                  <span class="text-muted" style="font-size: 0.85rem">💬 ${q.answer_count}</span>
                  <div class="vote-section">
                    <button class="vote-btn" onclick="voteQuestion(${q.id}, 1, event)">▲</button>
                    <span class="vote-count">${q.vote_count}</span>
                    <button class="vote-btn" onclick="voteQuestion(${q.id}, -1, event)">▼</button>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('') + `</div>`;
        
        renderPagination(data.pagination);
      } catch (err) {
        alert('載入失敗: ' + err.message);
      }
    }

    async function submitQuestion() {
      const title = document.getElementById('q-title').value;
      const content = document.getElementById('q-content').value;
      const tag = document.getElementById('q-tag').value;

      try {
        await window.api.postQuestion(title, content, tag);
        toggleAskForm();
        document.getElementById('q-title').value = '';
        document.getElementById('q-content').value = '';
        document.getElementById('q-tag').value = '';
        loadQuestions();
      } catch (err) {
        alert('發布失敗: ' + err.message);
      }
    }

    async function voteQuestion(id, value, event) {
      event.stopPropagation(); // 防止點擊投票時觸發卡片跳轉
      if (!window.api.getUser()) {
        alert('請先登入才能投票喔！');
        window.location.href = '/login.html';
        return;
      }
      try {
        await window.api.vote('question', id, value);
        loadQuestions(); // 重新載入更新票數
      } catch (err) {
        alert('投票失敗: ' + err.message);
      }
    }

    function renderPagination(pageData) {
      const container = document.getElementById('pagination-controls');
      if (pageData.total_pages <= 1) {
        container.innerHTML = '';
        return;
      }
      
      let html = '';
      if (pageData.page > 1) {
        html += `<button class="btn btn-outline btn-small" onclick="goToPage(${pageData.page - 1})">上一頁</button>`;
      } else {
        html += `<button class="btn btn-outline btn-small" disabled style="opacity: 0.5">上一頁</button>`;
      }
      
      html += `<span class="text-muted">第 ${pageData.page} / ${pageData.total_pages} 頁</span>`;
      
      if (pageData.page < pageData.total_pages) {
        html += `<button class="btn btn-outline btn-small" onclick="goToPage(${pageData.page + 1})">下一頁</button>`;
      } else {
        html += `<button class="btn btn-outline btn-small" disabled style="opacity: 0.5">下一頁</button>`;
      }
      container.innerHTML = html;
    }
    
    function goToPage(page) {
      currentPage = page;
      loadQuestions();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadQuestions();
  </script>
</body>
</html>
