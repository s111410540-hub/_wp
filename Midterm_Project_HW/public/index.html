<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊戲攻略問答社群</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="/index.html" class="nav-brand">GameQA</a>
      <div class="nav-links" id="nav-links"></div>
    </nav>
  </header>

  <main class="container">
    <div class="flex-between mb-1">
      <h1>最新問題</h1>
      <button class="btn" id="ask-btn">發布問題</button>
    </div>

    <div class="flex mb-1">
      <input type="text" id="search-input" placeholder="搜尋問題..." style="flex: 1; margin-bottom: 0;">
      <button class="btn btn-outline" onclick="loadQuestions()">搜尋</button>
    </div>

    <div id="ask-form" class="card hidden mb-1">
      <h2>發布新問題</h2>
      <input type="text" id="q-title" placeholder="問題標題 (例如: 薩爾達傳說王國之淚如何打人馬?)">
      <input type="text" id="q-tag" placeholder="遊戲標籤 (例如: 薩爾達傳說)">
      <textarea id="q-content" rows="4" placeholder="詳細描述你的問題..."></textarea>
      <button class="btn" onclick="submitQuestion()">送出問題</button>
      <button class="btn btn-outline" onclick="toggleAskForm()">取消</button>
    </div>

    <div id="questions-list"></div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('ask-btn').addEventListener('click', () => {
      if (!window.api.getUser()) {
        alert('請先登入');
        window.location.href = '/login.html';
        return;
      }
      toggleAskForm();
    });

    function toggleAskForm() {
      document.getElementById('ask-form').classList.toggle('hidden');
    }

    async function loadQuestions() {
      const search = document.getElementById('search-input').value;
      try {
        const data = await window.api.getQuestions('', search);
        const list = document.getElementById('questions-list');
        
        if (data.results.length === 0) {
          list.innerHTML = '<p class="text-center text-muted mt-2">目前沒有問題，成為第一個發問的人吧！</p>';
          return;
        }

        list.innerHTML = data.results.map(q => `
          <div class="card flex question-layout">
            <div class="vote-section">
              <span class="vote-count">${q.vote_count}</span>
              <span class="text-muted" style="font-size: 0.8rem">得票</span>
            </div>
            <div class="content-section">
              <h3><a href="/question.html?id=${q.id}">${escapeHtml(q.title)}</a></h3>
              <div class="meta">
                <span>作者: ${escapeHtml(q.username)}</span>
                <span>回答數: ${q.answer_count}</span>
                <span>時間: ${formatDate(q.created_at)}</span>
                ${q.is_solved ? '<span class="accepted-badge">已解決 ✓</span>' : ''}
              </div>
              ${q.game_tag ? `<div class="mt-2"><span class="tag">${escapeHtml(q.game_tag)}</span></div>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) {
        alert('載入失敗: ' + err.message);
      }
    }

    async function submitQuestion() {
      const title = document.getElementById('q-title').value;
      const content = document.getElementById('q-content').value;
      const tag = document.getElementById('q-tag').value;

      try {
        await window.api.postQuestion(title, content, tag);
        toggleAskForm();
        document.getElementById('q-title').value = '';
        document.getElementById('q-content').value = '';
        document.getElementById('q-tag').value = '';
        loadQuestions();
      } catch (err) {
        alert('發布失敗: ' + err.message);
      }
    }

    loadQuestions();
  </script>
</body>
</html>
