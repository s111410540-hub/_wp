<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天榜 - Glory 攻略討論版</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .leaderboard-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .leaderboard-header h1 {
      font-size: 2.5rem;
      color: var(--primary);
    }

    .leaderboard-header p {
      color: var(--text-muted);
    }

    .ranking-table-container {
      background: var(--surface);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px -5px rgba(139, 90, 43, 0.05);
      border: 1px solid var(--border);
    }

    .ranking-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ranking-table th,
    .ranking-table td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(230, 213, 195, 0.5);
    }

    .ranking-table th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ranking-table tr {
      transition: background 0.2s;
    }

    .ranking-table tr:hover {
      background: var(--surface-hover);
    }

    .ranking-table tr:last-child td {
      border-bottom: none;
    }

    .rank-number {
      font-weight: bold;
      font-size: 1.2rem;
      width: 40px;
      text-align: center;
      display: inline-block;
    }

    /* Gold, Silver, Bronze */
    .rank-1 .rank-number {
      color: #FFD700;
      font-size: 1.5rem;
      text-shadow: 0 2px 4px rgba(255, 215, 0, 0.3);
    }

    .rank-2 .rank-number {
      color: #C0C0C0;
      font-size: 1.3rem;
      text-shadow: 0 2px 4px rgba(192, 192, 192, 0.3);
    }

    .rank-3 .rank-number {
      color: #CD7F32;
      font-size: 1.2rem;
      text-shadow: 0 2px 4px rgba(205, 127, 50, 0.3);
    }

    .player-name {
      font-weight: 700;
      color: var(--text-main);
      font-size: 1.1rem;
    }

    .player-class {
      font-size: 0.85rem;
      background: rgba(139, 90, 43, 0.1);
      color: var(--primary);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-weight: 600;
    }
    
    .points {
      font-weight: bold;
      color: var(--primary);
    }
  </style>
</head>

<body>
  <div class="app-layout" id="app-root">
    <main class="main-content">
      <div class="leaderboard-header slide-up" style="animation-delay: 0.1s;">
        <h1>👑 Glory 神之領域 - 榮耀天榜</h1>
        <p>匯聚全服最強的頂尖高手，這是實力與榮耀的最終證明！</p>
      </div>

      <div class="ranking-table-container slide-up" style="animation-delay: 0.2s;">
        <table class="ranking-table">
          <thead>
            <tr>
              <th style="width: 80px;">排名</th>
              <th>角色名稱</th>
              <th>等級</th>
              <th>職業</th>
              <th>競技場積分</th>
            </tr>
          </thead>
          <tbody>
            <tr class="rank-1">
              <td><span class="rank-number">1</span></td>
              <td class="player-name">一葉之秋</td>
              <td>75</td>
              <td><span class="player-class">戰鬥法師</span></td>
              <td class="points">25,000</td>
            </tr>
            <tr class="rank-2">
              <td><span class="rank-number">2</span></td>
              <td class="player-name">百花撩亂</td>
              <td>75</td>
              <td><span class="player-class">槍手</span></td>
              <td class="points">24,900</td>
            </tr>
            <tr class="rank-3">
              <td><span class="rank-number">3</span></td>
              <td class="player-name">夜雨聲煩</td>
              <td>75</td>
              <td><span class="player-class">劍士</span></td>
              <td class="points">24,880</td>
            </tr>
            <tr class="rank-4">
              <td><span class="rank-number">4</span></td>
              <td class="player-name">大漠孤煙</td>
              <td>75</td>
              <td><span class="player-class">拳法家</span></td>
              <td class="points">24,850</td>
            </tr>
            <tr class="rank-5">
              <td><span class="rank-number">5</span></td>
              <td class="player-name">索克薩爾</td>
              <td>75</td>
              <td><span class="player-class">術士</span></td>
              <td class="points">24,820</td>
            </tr>
            <tr class="rank-6">
              <td><span class="rank-number">6</span></td>
              <td class="player-name">王不留行</td>
              <td>75</td>
              <td><span class="player-class">魔道學者</span></td>
              <td class="points">24,790</td>
            </tr>
            <tr class="rank-7">
              <td><span class="rank-number">7</span></td>
              <td class="player-name">生靈滅</td>
              <td>75</td>
              <td><span class="player-class">機械師</span></td>
              <td class="points">24,760</td>
            </tr>
            <tr class="rank-8">
              <td><span class="rank-number">8</span></td>
              <td class="player-name">流光</td>
              <td>75</td>
              <td><span class="player-class">劍士</span></td>
              <td class="points">24,730</td>
            </tr>
            <tr class="rank-9">
              <td><span class="rank-number">9</span></td>
              <td class="player-name">雲之巔</td>
              <td>75</td>
              <td><span class="player-class">槍手</span></td>
              <td class="points">24,700</td>
            </tr>
            <tr class="rank-10">
              <td><span class="rank-number">10</span></td>
              <td class="player-name">沙場秋點兵</td>
              <td>75</td>
              <td><span class="player-class">拳法家</span></td>
              <td class="points">24,670</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
